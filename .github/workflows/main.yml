name: Build and Release NBTEditorPro

on:
  push:
    tags:
      - 'v*'

# Isso é o que resolve o erro 403:
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable with PyInstaller
      run: |
        python -m PyInstaller --noconsole --onefile --name "NBTEditorPro" main.py

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NBTEditorPro.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}